<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 Random Món Ăn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 0%, #2a3a8c, #1a2a6c 40%, #b21f1f);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px 48px;
    overflow-x: hidden;
  }
  h1 { font-size: 2.2rem; text-align: center; margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
  .sub { opacity: .85; margin-bottom: 22px; text-align: center; }

  /* ===== Máy quay lồng cầu ===== */
  .machine { position: relative; width: 320px; display: flex; flex-direction: column; align-items: center; }

  /* Lồng cầu thuỷ tinh */
  .globe {
    position: relative;
    width: 300px; height: 300px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), rgba(255,255,255,.08) 38%, rgba(255,255,255,0) 60%),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), rgba(20,20,60,.25));
    border: 5px solid rgba(255,255,255,.5);
    box-shadow:
      0 22px 50px rgba(0,0,0,.5),
      inset 0 0 50px rgba(120,160,255,.25),
      inset -18px -22px 60px rgba(0,0,0,.45);
    overflow: hidden;
    backdrop-filter: blur(1px);
  }
  .globe.shake { animation: rumble .12s linear infinite; }
  @keyframes rumble {
    0%{transform:translate(0,0)} 25%{transform:translate(-2px,1px)}
    50%{transform:translate(2px,-1px)} 75%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,2px)}
  }
  /* loé sáng kính */
  .globe::after{
    content:''; position:absolute; top:8%; left:14%; width:34%; height:24%;
    background:radial-gradient(closest-side, rgba(255,255,255,.7), transparent);
    border-radius:50%; pointer-events:none; filter:blur(2px);
  }

  .ball {
    position: absolute; width: 46px; height: 46px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 1.35rem; will-change: transform; left:0; top:0;
    box-shadow: inset -6px -7px 12px rgba(0,0,0,.35), inset 5px 6px 10px rgba(255,255,255,.55), 0 3px 6px rgba(0,0,0,.3);
  }
  .ball::before{ /* highlight */
    content:''; position:absolute; top:7px; left:9px; width:14px; height:11px;
    background:rgba(255,255,255,.85); border-radius:50%; filter:blur(1px);
  }

  /* Cổ phễu + lỗ thoát */
  .neck {
    width: 64px; height: 26px; margin-top: -6px;
    background: linear-gradient(#ffd700, #d4a017);
    clip-path: polygon(18% 0, 82% 0, 100% 100%, 0 100%);
    box-shadow: 0 6px 14px rgba(0,0,0,.4);
  }
  .chute {
    width: 16px; height: 60px;
    background: linear-gradient(90deg,#bb8600,#ffd700,#bb8600);
    box-shadow: inset 0 0 6px rgba(0,0,0,.4);
  }

  /* Bệ máy: chứa nút bấm + bóng lăn ra */
  .tray {
    position: relative; width: 300px; height: 118px; margin-top: 2px;
    border-radius: 0 0 28px 28px;
    background: linear-gradient(#3a3a6a,#22223e);
    border: 5px solid #ffd700; border-top: none;
    box-shadow: 0 16px 34px rgba(0,0,0,.5), inset 0 8px 16px rgba(0,0,0,.5);
    display:flex; align-items:center; justify-content:center;
  }
  /* khe nhả bóng dưới máng */
  .tray::before{
    content:''; position:absolute; top:-3px; left:50%; transform:translateX(-50%);
    width:46px; height:10px; border-radius:6px;
    background:#11111e; box-shadow:inset 0 2px 4px rgba(0,0,0,.8);
  }
  /* bóng lăn từ máng xuống bệ */
  .roller {
    position:absolute; left:50%; top:-30px; width:36px; height:36px; border-radius:50%;
    transform:translate(-50%,-30px) scale(.5); opacity:0; pointer-events:none;
    box-shadow: inset -5px -6px 10px rgba(0,0,0,.35), inset 4px 5px 9px rgba(255,255,255,.5), 0 3px 6px rgba(0,0,0,.35);
  }
  .roller::before{ content:''; position:absolute; top:6px; left:8px; width:11px; height:8px; background:rgba(255,255,255,.85); border-radius:50%; filter:blur(1px); }
  .roller.go-down{ animation: rollDown 1.1s cubic-bezier(.5,.05,.6,1) forwards; }
  @keyframes rollDown{
    0%   { opacity:1; transform:translate(-50%,-30px) scale(.5) rotate(0deg); }
    55%  { opacity:1; transform:translate(-50%,22px) scale(1) rotate(220deg); }
    70%  { transform:translate(-50%,6px) scale(1) rotate(280deg); }
    100% { opacity:1; transform:translate(-50%,22px) scale(1) rotate(360deg); }
  }

  /* ===== Popup kết quả ===== */
  .popup {
    position: fixed; inset: 0; z-index: 50;
    display:flex; align-items:center; justify-content:center;
    background: rgba(8,10,30,.72); backdrop-filter: blur(4px);
    opacity:0; visibility:hidden; transition: opacity .35s, visibility .35s;
  }
  .popup.show { opacity:1; visibility:visible; }
  .popup-card{
    position:relative; width: 320px; padding: 56px 24px 28px;
    border-radius: 26px; text-align:center;
    background: linear-gradient(160deg,#fff,#ffe9ec);
    box-shadow: 0 30px 70px rgba(0,0,0,.6), inset 0 0 0 4px #ffd700;
    transform: scale(.7) translateY(20px); transition: transform .4s cubic-bezier(.34,1.5,.5,1);
  }
  .popup.show .popup-card{ transform: scale(1) translateY(0); }
  .popup-title{ color:#b21f1f; font-weight:800; font-size:1rem; letter-spacing:.5px; opacity:.8; }
  .popup-stage{ position:relative; height:150px; margin:8px 0 4px; }

  /* ===== Quả bóng trúng (mở ra trong popup) ===== */
  .prize {
    position: absolute; left: 50%; top: 50%; width: 110px; height: 110px;
    transform: translate(-50%,-50%);
  }
  .half {
    position:absolute; left:0; width:110px; height:55px; overflow:hidden;
    transition: transform .55s cubic-bezier(.34,1.4,.5,1), opacity .5s;
  }
  .half .skin{
    position:absolute; left:0; width:110px; height:110px; border-radius:50%;
    background: radial-gradient(circle at 34% 30%, #fff8, transparent 42%), linear-gradient(135deg,#ff5e7e,#d4143c);
    box-shadow: inset -8px -9px 16px rgba(0,0,0,.4), inset 6px 7px 12px rgba(255,255,255,.5);
  }
  .half.top    { top:0; }
  .half.top .skin{ top:0; }
  .half.bottom { top:55px; }
  .half.bottom .skin{ top:-55px; }
  /* viền mép giữa */
  .half.top::after, .half.bottom::after{
    content:''; position:absolute; left:8%; width:84%; height:6px;
    background:rgba(255,255,255,.65); border-radius:3px;
  }
  .half.top::after{ bottom:0; }
  .half.bottom::after{ top:0; }

  .prize.open .half.top    { transform: translateY(-80px) rotate(-16deg); opacity:.2; }
  .prize.open .half.bottom { transform: translateY(80px)  rotate(16deg);  opacity:.2; }

  /* Lõi: tờ giấy kết quả */
  .core {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(0);
    min-width: 230px; padding: 16px 20px; border-radius: 14px;
    background:#fffbe6; color:#b21f1f; font-weight:900; font-size:1.5rem; text-align:center;
    box-shadow:0 12px 34px rgba(0,0,0,.4); white-space:nowrap; z-index:5;
    transition: transform .5s cubic-bezier(.34,1.6,.5,1) .15s;
  }
  .prize.open .core { transform: translate(-50%,-50%) scale(1); }
  .prize.open .core::before{ content:'👉 '; }
  .prize.open .core::after{ content:' 👈'; }

  /* dấu X đóng popup */
  button.close {
    position:absolute; top:12px; right:12px;
    width:36px; height:36px; padding:0; line-height:1;
    border:none; border-radius:50%; cursor:pointer;
    font-size:1.5rem; font-weight:700; color:#b21f1f;
    background:#ffe1e1; box-shadow:0 3px 8px rgba(0,0,0,.2);
    transition:.15s;
  }
  button.close:hover{ background:#d4143c; color:#fff; transform:rotate(90deg); }

  /* nút */
  button.go {
    position: relative;
    padding: 17px 46px; font-size: 1.2rem; font-weight: 900;
    border: none; border-radius: 999px; cursor: pointer;
    color: #7a0f0f; letter-spacing: 1.5px;
    background: linear-gradient(180deg, #fff4b0 0%, #ffd700 38%, #f0a800 75%, #c97f00 100%);
    box-shadow:
      0 2px 0 #a86b00,
      0 8px 0 #7a4d00,
      0 16px 26px rgba(0,0,0,.45),
      inset 0 2px 3px rgba(255,255,255,.9),
      inset 0 -4px 8px rgba(150,90,0,.45);
    text-shadow: 0 1px 0 rgba(255,255,255,.55);
    transition: transform .12s, box-shadow .12s, filter .2s;
    animation: pulse 2s ease-in-out infinite;
  }
  /* lớp loé sáng chạy ngang */
  button.go::before {
    content: ''; position: absolute; inset: 0; border-radius: 999px; overflow: hidden;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.75) 47%, transparent 60%);
    background-size: 250% 100%; background-position: 200% 0;
    pointer-events: none;
  }
  button.go:hover:not(:disabled) {
    transform: translateY(-3px);
    filter: brightness(1.05);
    box-shadow:
      0 2px 0 #a86b00, 0 11px 0 #7a4d00,
      0 22px 34px rgba(0,0,0,.5),
      inset 0 2px 3px rgba(255,255,255,.9), inset 0 -4px 8px rgba(150,90,0,.45);
  }
  button.go:hover:not(:disabled)::before { animation: shine .9s ease forwards; }
  @keyframes shine { to { background-position: -120% 0; } }
  button.go:active:not(:disabled) {
    transform: translateY(6px);
    box-shadow:
      0 1px 0 #a86b00, 0 2px 0 #7a4d00,
      0 6px 12px rgba(0,0,0,.4),
      inset 0 2px 3px rgba(255,255,255,.9), inset 0 -3px 6px rgba(150,90,0,.45);
  }
  button.go:disabled { opacity: .55; cursor: not-allowed; filter: grayscale(.3); animation: none; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 2px 0 #a86b00, 0 8px 0 #7a4d00, 0 16px 26px rgba(0,0,0,.45), 0 0 0 0 rgba(255,215,0,.5), inset 0 2px 3px rgba(255,255,255,.9), inset 0 -4px 8px rgba(150,90,0,.45); }
    50%     { box-shadow: 0 2px 0 #a86b00, 0 8px 0 #7a4d00, 0 16px 26px rgba(0,0,0,.45), 0 0 0 12px rgba(255,215,0,0), inset 0 2px 3px rgba(255,255,255,.9), inset 0 -4px 8px rgba(150,90,0,.45); }
  }
</style>
</head>
<body>
  <h1>🍜 Hôm Nay Ăn Gì?</h1>

  <div class="machine">
    <div class="globe" id="globe"></div>
    <div class="neck"></div>
    <div class="chute"></div>
    <div class="tray">
      <div class="roller" id="roller"></div>
      <button class="go" id="go">🎰 QUAY MÓN!</button>
    </div>
  </div>

  <!-- Popup kết quả -->
  <div class="popup" id="popup">
    <div class="popup-card">
      <button class="close" id="close" aria-label="Đóng">&times;</button>
      <div class="popup-title">🎉 MÓN CỦA BẠN HÔM NAY</div>
      <div class="popup-stage">
        <div class="prize" id="prize">
          <div class="half top"><div class="skin"></div></div>
          <div class="half bottom"><div class="skin"></div></div>
          <div class="core" id="core"></div>
        </div>
      </div>
    </div>
  </div>

<script>
const FOODS = [
  'Cơm','Phở','Cơm rang','Bún bò Huế','Bún mọc','Bánh canh','Mỳ cay','Bún riêu','Bún sườn chua','Bún chả',
  'Mì Quảng','Bánh tráng cuốn thịt heo','Nem nướng Nha Trang','Bánh cuốn','Bún đậu mắm tôm','Mỳ kim chi chua cay','Vằn thắn','Đồ Hàn','Đồ Nhật'
];
const EMOJIS = ['🍜','🍲','🍚','🍛','🥘','🍝','🥟','🍢','🌶️','🥗','🍱','🥢','🍤','🥡'];
const COLORS = [
  '#ff5e7e,#d4143c','#ffb347,#ff7b00','#5ee2a0,#0a9c5a','#5e9bff,#1453d4',
  '#c08bff,#7a14d4','#ffe35e,#e0a800','#ff8bd0,#d41488','#5ee0e0,#0a9c9c'
];

// ===== Lồng cầu + bóng (physics) =====
const globe = document.getElementById('globe');
const go = document.getElementById('go');
const prize = document.getElementById('prize');
const core = document.getElementById('core');
const roller = document.getElementById('roller');
const popup = document.getElementById('popup');
const closeBtn = document.getElementById('close');

const R = 150;            // bán kính lồng (globe 300/2)
const BR = 23;            // bán kính bóng (46/2)
const MAX = R - BR - 4;   // khoảng cách tâm tối đa
const N = 14;
const balls = [];

for (let i = 0; i < N; i++) {
  const el = document.createElement('div');
  el.className = 'ball';
  el.style.background = `radial-gradient(circle at 34% 30%, #fff8, transparent 42%), linear-gradient(135deg, ${COLORS[i % COLORS.length]})`;
  el.textContent = EMOJIS[i % EMOJIS.length];
  globe.appendChild(el);
  const ang = Math.random() * Math.PI * 2;
  const rad = Math.random() * MAX;
  balls.push({
    el,
    x: R + Math.cos(ang) * rad,
    y: R + Math.sin(ang) * rad,
    vx: (Math.random() - .5) * 2,
    vy: (Math.random() - .5) * 2,
  });
}

let spinning = false;
function physics() {
  const g = spinning ? 0.25 : 0.5;          // trọng lực
  const turb = spinning ? 2.6 : 0.05;        // nhiễu loạn (gió thổi)
  const blow = spinning ? 1.6 : 0;           // lực thổi lên
  for (const b of balls) {
    b.vy += g;
    b.vx += (Math.random() - .5) * turb;
    b.vy += (Math.random() - .5) * turb - blow * Math.random();
    b.vx *= 0.99; b.vy *= 0.99;
    b.x += b.vx; b.y += b.vy;

    // va chạm thành lồng cầu
    const dx = b.x - R, dy = b.y - R;
    const d = Math.hypot(dx, dy);
    if (d > MAX) {
      const nx = dx / d, ny = dy / d;
      b.x = R + nx * MAX; b.y = R + ny * MAX;
      const dot = b.vx * nx + b.vy * ny;
      b.vx = (b.vx - 2 * dot * nx) * 0.7;
      b.vy = (b.vy - 2 * dot * ny) * 0.7;
    }
    b.el.style.transform = `translate(${b.x - BR}px, ${b.y - BR}px)`;
  }
  requestAnimationFrame(physics);
}
physics();

// ===== Quay =====
go.onclick = () => {
  go.disabled = true;
  prize.className = 'prize';   // reset bóng trúng (đóng lại)

  // bắt đầu quay: bóng bay loạn
  spinning = true;
  globe.classList.add('shake');

  const winner = FOODS[Math.floor(Math.random() * FOODS.length)];
  // chọn màu cho bóng trúng (đồng bộ bóng lăn ra)
  const c = COLORS[Math.floor(Math.random() * COLORS.length)];
  const grad = `radial-gradient(circle at 34% 30%, #fff8, transparent 42%), linear-gradient(135deg, ${c})`;
  roller.style.background = grad;
  prize.querySelectorAll('.skin').forEach(s => s.style.background = grad);
  core.textContent = winner;

  // quay 2.8s rồi nhả bóng lăn xuống bệ
  setTimeout(() => {
    spinning = false;
    globe.classList.remove('shake');

    roller.classList.add('go-down');
    // bóng lăn xong -> bật popup, mở bóng
    setTimeout(() => {
      popup.classList.add('show');
      setTimeout(() => prize.classList.add('open'), 350);
    }, 1100);
  }, 2800);
};

// đóng popup, sẵn sàng quay tiếp
function closePopup() {
  popup.classList.remove('show');
  roller.classList.remove('go-down');
  go.disabled = false;
}
closeBtn.onclick = closePopup;
popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
</script>
</body>
</html>
