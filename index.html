<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 Random Món Ăn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  h1 { font-size: 2.2rem; text-align: center; margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
  .sub { opacity: .85; margin-bottom: 28px; text-align: center; }

  /* Khung máy xổ số */
  .machine {
    background: linear-gradient(#2a2a4a, #1a1a2e);
    border: 6px solid #ffd700;
    border-radius: 24px;
    padding: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.6);
    margin-bottom: 30px;
    position: relative;
  }
  .machine::before, .machine::after {
    content: ''; position: absolute; left: 50%; transform: translateX(-50%);
    border-left: 14px solid transparent; border-right: 14px solid transparent;
    z-index: 5;
  }
  .machine::before { top: 6px; border-top: 16px solid #ffd700; }
  .machine::after  { bottom: 6px; border-bottom: 16px solid #ffd700; }

  .window {
    width: 320px; height: 132px; overflow: hidden; position: relative;
    border-radius: 14px; background: #fff;
  }
  /* Vạch chỉ ô trúng ở giữa */
  .window::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(rgba(255,255,255,.85), transparent 22%, transparent 78%, rgba(255,255,255,.85));
    pointer-events: none; z-index: 3;
  }
  .reel { display: flex; flex-direction: column; will-change: transform; }
  .slot {
    height: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center;
    font-size: 1.35rem; font-weight: 800; color: #1a1a2e; text-align: center; padding: 0 8px;
    white-space: nowrap;
  }
  .slot.lit { color: #d4143c; }

  button.go {
    padding: 18px 56px; font-size: 1.25rem; font-weight: 800;
    border: none; border-radius: 999px; cursor: pointer;
    background: #ffd700; color: #b21f1f;
    box-shadow: 0 8px 24px rgba(0,0,0,.4); transition: .15s;
    letter-spacing: 1px;
  }
  button.go:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,.5); }
  button.go:active:not(:disabled) { transform: translateY(0); }
  button.go:disabled { opacity: .6; cursor: not-allowed; }

  .result {
    margin-top: 22px; font-size: 1.5rem; font-weight: 800; min-height: 1.6em;
    text-align: center; opacity: 0; transition: opacity .3s; text-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .result.show { opacity: 1; animation: pop .4s ease; }
  @keyframes pop { 0%{transform:scale(.7)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
</style>
</head>
<body>
  <h1>🍜 Hôm Nay Ăn Gì?</h1>
  <p class="sub">Bấm nút và để máy xổ số chọn món cho bạn!</p>

  <div class="machine">
    <div class="window">
      <div class="reel" id="reel"></div>
    </div>
  </div>

  <button class="go" id="go">🎰 QUAY MÓN!</button>
  <div class="result" id="result"></div>

<script>
const FOODS = [
  'Cơm','Phở','Cơm rang','Bún bò Huế','Bún mọc','Bánh canh','Mỳ cay','Bún riêu','Bún sườn chua','Bún chả',
  'Mì Quảng','Bánh tráng cuốn thịt heo','Nem nướng Nha Trang','Bánh cuốn','Bún đậu mắm tôm','Mỳ kim chi chua cay','Vằn thắn','Đồ Hàn','Đồ Nhật'
];

const SLOT_H = 44;          // chiều cao mỗi ô (px)
const VISIBLE = 3;          // số ô nhìn thấy
const CENTER = 1;           // ô trúng nằm giữa (index 1 trong khung)
const reel = document.getElementById('reel');
const go = document.getElementById('go');
const result = document.getElementById('result');

// Tạo dải băng dài: nhiều vòng lặp để cuộn cho đã rồi dừng ở món được chọn
function buildReel(winner) {
  const LOOPS = 8;
  const strip = [];
  for (let i = 0; i < LOOPS; i++) strip.push(...FOODS);
  // thêm đúng món trúng ở cuối để dừng lại
  strip.push(winner);
  reel.innerHTML = strip.map(f => `<div class="slot">${f}</div>`).join('');
  return strip;
}

// hiển thị ban đầu
buildReel(FOODS[0]);
reel.style.transform = `translateY(-${(0 - CENTER) * SLOT_H + SLOT_H}px)`;
reel.style.transform = `translateY(0px)`;

go.onclick = () => {
  go.disabled = true;
  result.classList.remove('show');

  const winner = FOODS[Math.floor(Math.random() * FOODS.length)];
  const strip = buildReel(winner);
  const finalIndex = strip.length - 1;                 // vị trí món trúng (ô cuối)
  // đưa ô trúng vào giữa khung
  const targetY = -(finalIndex - CENTER) * SLOT_H;

  // reset không animation về đầu
  reel.style.transition = 'none';
  reel.style.transform = 'translateY(0px)';
  void reel.offsetHeight; // ép browser reflow

  // chạy animation cuộn dài, dừng mượt (easing giảm tốc)
  reel.style.transition = 'transform 3.6s cubic-bezier(0.15, 0.85, 0.25, 1)';
  reel.style.transform = `translateY(${targetY}px)`;

  // làm sáng ô trúng + hiện kết quả khi dừng
  setTimeout(() => {
    const slots = reel.querySelectorAll('.slot');
    slots[finalIndex].classList.add('lit');
    result.textContent = '👉 ' + winner + ' 👈';
    result.classList.add('show');
    go.disabled = false;
  }, 3700);
};
</script>
</body>
</html>
